name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Validação de código
  validate:
    runs-on: ubuntu-latest
    name: Validate Code
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.4.1
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: TypeScript validation
        run: pnpm check
      
      - name: Format check
        run: pnpm format --check
        continue-on-error: true

  # Job 2: Testes
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.4.1
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run unit tests
        run: pnpm test
        env:
          NODE_ENV: test
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  # Job 3: Build
  build:
    runs-on: ubuntu-latest
    name: Build Application
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.4.1
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production
      
      - name: Verify build
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful"
            echo "Build size: $(du -sh dist/ | cut -f1)"
          else
            echo "❌ Build failed"
            exit 1
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  # Job 4: Relatório final
  report:
    runs-on: ubuntu-latest
    name: CI/CD Report
    needs: [validate, test, build]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.validate.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ] && \
             [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ All CI/CD checks passed!"
            exit 0
          else
            echo "❌ Some CI/CD checks failed"
            echo "Validate: ${{ needs.validate.result }}"
            echo "Test: ${{ needs.test.result }}"
            echo "Build: ${{ needs.build.result }}"
            exit 1
          fi
      
      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **CI/CD Pipeline Passed**\n\n- ✅ Code validation\n- ✅ Unit tests\n- ✅ Build successful'
            })
        continue-on-error: true
